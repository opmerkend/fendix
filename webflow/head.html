<style>
/* ==========================================================================
   CRITICAL CSS - FENDIX
   Paste in Webflow: Project Settings > Custom Code > Head
   ========================================================================== */

/* === SELECTION === */
::selection {
  color: var(--swatch--light);
  background: var(--swatch--dark);
}

/* === VIEW TRANSITIONS === */
@view-transition { navigation: auto; }
.navbar, .topbar { view-transition-name: none; }
@keyframes slide-to-bottom { to { opacity: 0; } }
@keyframes slide-to-top { from { opacity: 0; } to { opacity: 1; } }
::view-transition-old(root) { animation: 160ms ease-out slide-to-bottom; }
::view-transition-new(root) { animation: 240ms ease-in slide-to-top; }

/* === VARIABLES === */
:root {
  --nav-duration: 200ms;
  --nav-ease: cubic-bezier(.4, 0, .2, 1);
  --font-weight--400: 400;
  --font-weight--500: 500;
  --font-weight--600: 600;
  --font-weight--700: 700;
  --transition-button-duration: 300ms;
  --transition-button-ease: cubic-bezier(0.645, 0.045, 0.355, 1);
}

@media (max-width: 370px) {
  .navbar_content_grid.expertise {

    flex-wrap: wrap;
  }
  .navbar_content_grid.expertise .navbar_content_grid_col {
    flex: 1 1 250px;
  }
}

/* ==========================================================================
   NAVBAR SYSTEM
   CSS-first state management via :has() + [data-scrolled].
   JS only handles scroll detection.

   Dark state condition:
   .navbar[start-color="dark"]:not([data-scrolled]):not(:has(.w--open))
   ========================================================================== */

/* === NAVBAR TRANSITIONS === */
.navbar_link,
.topbar-link,
.topbar-locale_link,
.menu-button_label,
.logo_svg,
.logo_svg svg,
.hamburger_line {
  transition: color var(--nav-duration) var(--nav-ease),
              background-color var(--nav-duration) var(--nav-ease);
}

/* === SCROLL BACKGROUNDS === */
.navbar_scroll_background,
.topbar_background {
  height: 0;
  overflow: hidden;
  transition: height var(--nav-duration) var(--nav-ease);
  contain: layout style;
}

.topbar_background {
  opacity: 0;
  transition: height var(--nav-duration) var(--nav-ease), opacity var(--nav-duration);
}

.navbar_scroll_background.no-transition,
.topbar_background.no-transition {
  transition: none !important;
}

/* Active: scrolled or UI open */
.navbar[data-scrolled] .navbar_scroll_background,
.navbar:has(.w--open) .navbar_scroll_background {
  height: 100%;
}

:root:has(.navbar[data-scrolled]) .topbar_background,
:root:has(.navbar .w--open) .topbar_background {
  height: 100%;
  opacity: 1;
}

/* === DARK STATE: Text (inside navbar) ===
   Single :has() — no nesting, works in all browsers with :has() support */
.navbar[start-color="dark"]:not([data-scrolled]):not(:has(.w--open)) :is(
  .navbar_link,
  .menu-button_label,
  .logo_svg,
  .logo_svg svg,
  .hamburger_line) {
  color: #fff;
}

/* === DARK STATE: Topbar (outside navbar) ===
   Driven by [data-nav-dark] on <html>, set via JS to avoid nested :has() */
[data-nav-dark] :is(
  .topbar-link,
  .topbar-locale_link) {
  color: #fff;
}

[data-nav-dark] .topbar {
  background-image: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0));
}

/* === GLASS EFFECT === */
.navbar_background {
  -webkit-backdrop-filter: blur(0.75rem) saturate(1.4);
  backdrop-filter: blur(0.75rem) saturate(1.4);
  box-shadow: 0 1px 2px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.4);
}

.navbar[start-color="dark"]:not([data-scrolled]):not(:has(.w--open)) .navbar_background {
  -webkit-backdrop-filter: blur(0.75rem) saturate(1.2);
  backdrop-filter: blur(0.75rem) saturate(1.2);
  background-image: linear-gradient(180deg, rgba(255,255,255,0.19), rgba(255,255,255,0.01)) !important;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1), inset 0 2px 10px rgba(255,255,255,0.2);
}

.navbar_background::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 1px;
  border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(-30deg, rgba(255,255,255,.5), rgba(255,255,255,.25));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.navbar[start-color="dark"]:not([data-scrolled]):not(:has(.w--open)) .navbar_background::before {
  background: linear-gradient(0deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3));
}

/* === RADIUS RESET === */
.navbar:has(.w-dropdown-toggle.w--open) .navbar_scroll_background,
.navbar:has(.navbar_menu-button.w--open) .navbar_scroll_background,
.navbar:has(.w-nav-button.w--open) .navbar_scroll_background {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}

/* === NAV OVERLAY === */
.nav-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  height: 0;
  opacity: 0 !important;
  visibility: hidden !important;
  pointer-events: none !important;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(6px);
  transition: opacity 200ms, visibility 0s linear 200ms;
}

@media (min-width: 992px) {
  .navbar:has(.w-dropdown-toggle.w--open) .nav-overlay {
    height: 100dvh;
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
    transition: height 200ms, opacity 200ms, visibility 0s;
  }
}

@media (max-width: 991px) {
  .navbar:has(.navbar_menu-button.w--open) .nav-overlay,
  .navbar:has(.w-nav-button.w--open) .nav-overlay {
    height: 100dvh;
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
    transition: height 200ms, opacity 200ms, visibility 0s;
  }
}

/* === HAMBURGER === */
.hamburger_wrap {
  --thickness: .125rem;
  --gap: .5rem;
  --rotate: 45deg;
}

.navbar_menu-button.w--open .hamburger_line {

}

.navbar_menu-button.w--open .hamburger_line:first-child {
  transform: translateY(calc(var(--thickness) * .5 + var(--gap) * .5)) rotate(var(--rotate));
}

.navbar_menu-button.w--open .hamburger_line:last-child {
  transform: translateY(calc(var(--thickness) * -.5 - var(--gap) * .5)) rotate(calc(var(--rotate) * -1));
}

.menu-button_label {
  transition: transform 350ms var(--nav-ease);
}

.navbar_menu-button.w--open .menu-button_label.first,
.navbar_menu-button.w--open .menu-button_label.second {

/* === DROPDOWN === */

.navbar_link.dropdown.w-dropdown-toggle.w--open .button-icon_slot {
  transform: rotateX(180deg);

@media (min-width: 992px) {

@media (max-width: 991px) {

@media (hover: hover) {

/* === DROPDOWN CONTAINER === */
.navbar_container.is-dropdown::before {

  inset: 0 auto 0 -100vw;

  pointer-events: none;

/* ==========================================================================

<!-- Navbar: Scroll Detection + Topbar Dark Bridge -->
<script>
(function(){
  var nav, ticking = false;

  function updateDark() {
    if (!nav) return;
    var dark = nav.getAttribute('start-color') === 'dark'
      && !nav.hasAttribute('data-scrolled')
      && !nav.querySelector('.w--open');
    document.documentElement.toggleAttribute('data-nav-dark', dark);
  }

  function update() {
    if (!nav) return;
    nav.toggleAttribute('data-scrolled', window.scrollY > 0);
    updateDark();
  }

  function init() {
    nav = document.querySelector('.navbar');
    if (!nav) return;
    if (window.scrollY > 0) {
      var nb = nav.querySelector('.navbar_scroll_background');
      var tb = document.querySelector('.topbar_background');
      if (nb) nb.classList.add('no-transition');
      if (tb) tb.classList.add('no-transition');
      nav.setAttribute('data-scrolled', '');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          if (nb) nb.classList.remove('no-transition');
          if (tb) tb.classList.remove('no-transition');
        });
      });
    }
    updateDark();
    new MutationObserver(updateDark).observe(nav, {
      subtree: true, attributes: true, attributeFilter: ['class']
    });
  }

  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() { update(); ticking = false; });
      ticking = true;
    }
  }, { passive: true });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();
</script>
