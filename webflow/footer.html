<!-- Swiper CSS + JS (only when sliders exist on the page) -->
<script>
if(document.querySelector('.swiper')){
  var c=document.createElement('link');c.rel='stylesheet';c.href='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css';c.media='print';c.onload=function(){c.media='all'};document.head.appendChild(c);
  var s=document.createElement('script');s.defer=true;s.src='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js';
  s.onload=function(){var i=document.createElement('script');i.defer=true;i.src='https://cdn.jsdelivr.net/gh/opmerkend/fendix@main/swiper-init.js';document.body.appendChild(i);};
  document.body.appendChild(s);
}
</script>

<!-- GTM (delayed until user interaction or 1s) -->
<script>
(function(){
  var l=false,g=function(){if(l)return;l=true;
  (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
  var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';
  j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-T2LHHMLZ');};
  ['scroll','click','touchstart','keydown'].forEach(function(e){document.addEventListener(e,g,{once:true,passive:true});});
  setTimeout(g,1000);
})();
</script>

<!-- Fendix Tracking (delayed until user interaction or 1.5s) -->
<script>
(function(){
  var l=false,t=function(){if(l)return;l=true;
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/gh/measurebase/next-gen-fendix-nick@main/tracking-test.js';
  document.body.appendChild(s);};
  ['scroll','click','touchstart','keydown'].forEach(function(e){document.addEventListener(e,t,{once:true,passive:true});});
  setTimeout(t,1500);
})();
</script>
